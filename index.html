/* ══ IMAGE COMPRESSION ══ */
const compressImage = (dataUrl, maxSize=200, quality=0.75) => new Promise(resolve => {
  const img = new Image();
  img.onload = () => {
    const scale = Math.min(maxSize/img.width, maxSize/img.height, 1);
    const canvas = document.createElement('canvas');
    canvas.width  = Math.round(img.width  * scale);
    canvas.height = Math.round(img.height * scale);
    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
    resolve(canvas.toDataURL('image/jpeg', quality));
  };
  img.onerror = () => resolve(dataUrl);
  img.src = dataUrl;
});

  const commit = () => { onChange(draft.trim()||value); setEd(false); };
  if (!canEdit) return <span className={className}>{value||<span className="text-gray-400 italic text-xs">{placeholder}</span>}</span>;
  if (ed) return (
    <input autoFocus value={draft} placeholder={placeholder}
      className="border-b-2 border-blue-400 bg-transparent focus:outline-none w-full min-w-16"
      style={{fontSize:"inherit",fontWeight:"inherit"}}
      onChange={e=>setDraft(e.target.value)}
      onBlur={commit}
      onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape"){setDraft(value);setEd(false);}}}
    />
  );
  return (
    <span className={`group/ed inline-flex items-center gap-1 ${className}`}
      onDoubleClick={e=>{e.stopPropagation();setDraft(value);setEd(true);}}>
      <span>{value||<span className="text-gray-400 italic text-xs">{placeholder}</span>}</span>
      <button className="opacity-0 group-hover/ed:opacity-50 hover:!opacity-100 text-gray-400 hover:text-blue-500 text-xs"
        onClick={e=>{e.stopPropagation();setDraft(value);setEd(true);}}>✏️</button>
    </span>
  );
}

function EditNum({value, min=0, max=999999, suffix="", onChange}) {
  const canEdit = useRole() === "editor";
  const [ed, setEd] = useState(false);
  const [draft, setDraft] = useState(value);
  const commit = () => { onChange(Math.min(max,Math.max(min,Number(draft)||0))); setEd(false); };
  if (!canEdit) return <span className="tabular-nums">{value}{suffix}</span>;
  if (ed) return (
    <input autoFocus type="number" value={draft} min={min} max={max}
      className="w-14 border border-blue-400 rounded px-1 text-sm text-center focus:outline-none"
      onChange={e=>setDraft(e.target.value)} onBlur={commit}
      onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape")setEd(false);}}
    />
  );
  return <span className="cursor-pointer hover:text-blue-600 hover:underline" title="클릭 수정"
    onClick={e=>{e.stopPropagation();setDraft(value);setEd(true);}}>{value}{suffix}</span>;
}

function AddInput({placeholder, onAdd, onCancel}) {
  const [v, setV] = useState("");
  const go = () => { if(v.trim()) onAdd(v.trim()); else onCancel(); };
  return (
    <div className="flex items-center gap-1 mt-1.5" onClick={e=>e.stopPropagation()}>
      <input autoFocus value={v} placeholder={placeholder}
        className="flex-1 text-xs border border-blue-300 rounded-lg px-2 py-1 focus:outline-none focus:ring-1 focus:ring-blue-400"
        onChange={e=>setV(e.target.value)}
        onKeyDown={e=>{if(e.key==="Enter")go();if(e.key==="Escape")onCancel();}}
      />
      <button onClick={go} className="text-xs bg-blue-500 text-white px-2 py-1 rounded-lg hover:bg-blue-600 flex-shrink-0">추가</button>

/* ── 제품 이미지 컴포넌트 ── */
function ProductImage({image, name, size="sm", onChange}) {
  const canEdit = useRole() === "editor";
  const fileRef = useRef();
  const sz = size==="lg" ? "w-28 h-28 rounded-xl text-3xl" : size==="md" ? "w-16 h-16 rounded-lg text-2xl" : "w-10 h-10 rounded-lg text-base";
  const handleFile = e => {
    const f = e.target.files[0];
    if(!f) return;
    const reader = new FileReader();
    reader.onload = ev => {
      compressImage(ev.target.result, 200, 0.75).then(onChange);
    };
    reader.readAsDataURL(f);
    e.target.value = "";
  };
  return (
    <div className={`relative flex-shrink-0 group/img ${sz} overflow-hidden bg-gray-100 flex items-center justify-center`}
      style={{cursor: canEdit ? "pointer" : "default"}}
      onClick={e=>{ if(canEdit){e.stopPropagation();fileRef.current?.click();} }}>
      {image
        ? <img src={image} alt={name} className="w-full h-full object-cover"/>
        : <span className="select-none">📦</span>
      }
      {canEdit && (
        <div className="absolute inset-0 bg-black/40 opacity-0 group-hover/img:opacity-100 transition-opacity flex flex-col items-center justify-center gap-0.5">
          <span className="text-white text-xs font-medium leading-tight">{image?"변경":"사진추가"}</span>
          {image && <button className="text-red-300 hover:text-red-400 text-xs leading-tight"
            onClick={e=>{e.stopPropagation();onChange(null);}}>✕삭제</button>}
        </div>
      )}
      <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={handleFile}/>
    </div>
  );
}

/* ── D-day 태스크 마감일 ── */
function TaskDeadlinePill({value, onChange}) {
  const canEdit = useRole() === "editor";
  const [editing, setEditing] = useState(false);
  const today = new Date(); today.setHours(0,0,0,0);
  const d = value ? Math.round((new Date(value)-today)/86400000) : null;
  const label = d===null?null:d<0?`D+${Math.abs(d)}`:`D-${d}`;
  const color = d===null?""
    :d<0?"bg-red-100 text-red-600 border-red-200"
    :d===0?"bg-red-50 text-red-500 border-red-200"
    :d<=3?"bg-orange-100 text-orange-600 border-orange-200"
    :d<=7?"bg-amber-100 text-amber-600 border-amber-200"
    :"bg-gray-100 text-gray-500 border-gray-200";
  if (!canEdit) {
    if (!value) return null;
    return <span className={`text-xs px-1.5 py-0.5 rounded-full border font-medium flex-shrink-0 ${color}`} title={value}>{label}</span>;
  }
  if (editing) return (
    <input type="date" autoFocus value={value||""}
      className="text-xs border border-blue-300 rounded-lg px-1.5 py-0.5 focus:outline-none focus:ring-1 focus:ring-blue-400 flex-shrink-0"
      style={{width:"7.5rem"}}
      onChange={e=>onChange(e.target.value||null)} onBlur={()=>setEditing(false)}
      onKeyDown={e=>{if(e.key==="Escape")setEditing(false);}} onClick={e=>e.stopPropagation()}/>
  );
  return value
    ? <button onClick={e=>{e.stopPropagation();setEditing(true);}}
        className={`text-xs px-1.5 py-0.5 rounded-full border font-medium flex-shrink-0 transition-opacity hover:opacity-75 ${color}`}
        title={`마감일: ${value}`}>{label}</button>
    : <button onClick={e=>{e.stopPropagation();setEditing(true);}}
        className="opacity-0 group-hover/task:opacity-60 hover:!opacity-100 text-gray-400 hover:text-blue-500 text-xs flex-shrink-0 px-0.5"
        title="D-day 설정">📅</button>;
}

function SubRow({sub, onToggle, onDelete, onRename}) {

    <div className="flex items-center gap-1.5 pl-5 group/sub py-0.5">

        className={`w-3 h-3 rounded accent-blue-500 flex-shrink-0 ${canEdit?"cursor-pointer":"cursor-default opacity-60"}`}/>
      <Editable value={sub.label} onChange={onRename}
        className={`text-xs flex-1 min-w-0 ${sub.done?"line-through text-gray-400":"text-gray-600"}`} placeholder="하위 항목"/>
      {canEdit&&<button onClick={e=>{e.stopPropagation();onDelete();}} className="opacity-0 group-hover/sub:opacity-100 text-red-300 hover:text-red-500 text-xs flex-shrink-0 ml-1">✕</button>}

function TaskRow({task, onToggle, onDelete, onRename, onToggleOpen, onAddSub, onToggleSub, onDeleteSub, onRenameSub, onAssign, onSetDeadline}) {
  const canEdit = useRole() === "editor";
  const [addingSub, setAddingSub] = useState(false);
  const subDone = task.subtasks.filter(s=>s.done).length;
  return (
    <div className="group/task">
      <div className="flex items-center gap-1.5 py-0.5 flex-wrap">
        <input type="checkbox" checked={task.done} onChange={canEdit?onToggle:undefined} disabled={!canEdit}
          className={`w-3.5 h-3.5 rounded accent-blue-500 flex-shrink-0 ${canEdit?"cursor-pointer":"cursor-default opacity-60"}`}/>
        <Editable value={task.label} onChange={onRename}
          className={`text-xs flex-1 min-w-0 ${task.done?"line-through text-gray-400":"text-gray-700"}`} placeholder="태스크 이름"/>
        {task.subtasks.length>0&&(
          <button onClick={e=>{e.stopPropagation();onToggleOpen();}}
            className="text-xs text-gray-400 hover:text-gray-600 flex-shrink-0 bg-gray-100 rounded px-1 py-0.5">
            {subDone}/{task.subtasks.length} {task.open?"▴":"▾"}

        <TaskDeadlinePill value={task.deadline} onChange={onSetDeadline}/>
        <AssigneeSelect value={task.assignee} onChange={onAssign}/>

            <button onClick={e=>{e.stopPropagation();onDelete();}} className="text-red-300 hover:text-red-500 text-xs px-1 py-0.5 rounded hover:bg-red-50" title="삭제">✕</button>
          </span>
        )}

      {(task.open||addingSub)&&(
        <div className="mt-0.5">
          {task.open&&task.subtasks.map(s=>(
            <SubRow key={s.id} sub={s} onToggle={()=>onToggleSub(s.id)} onDelete={()=>onDeleteSub(s.id)} onRename={l=>onRenameSub(s.id,l)}/>
          ))}
          {addingSub&&<div className="pl-5"><AddInput placeholder="하위 태스크 이름..." onAdd={l=>{onAddSub(l);setAddingSub(false);}} onCancel={()=>setAddingSub(false)}/></div>}
        </div>
      )}
    </div>
  );
}

function TaskPanel({tasks, groupMeta={}, onUpdate, onUpdateGroupMeta}) {
  const canEdit = useRole() === "editor";
  const [addingTo, setAddingTo] = useState(null);
  const [newGroup, setNewGroup] = useState(false);
  const [newGroupName, setNewGroupName] = useState("");
  const [editingGroup, setEditingGroup] = useState(null);
  const [groupDraft, setGroupDraft] = useState({name:"", colorIdx:0});

  const up   = fn => onUpdate(fn);
  const toggleTask  = tid => up(ts=>ts.map(t=>t.id===tid?{...t,done:!t.done}:t));
  const deleteTask  = tid => up(ts=>ts.filter(t=>t.id!==tid));
  const renameTask  = (tid,l) => up(ts=>ts.map(t=>t.id===tid?{...t,label:l}:t));
  const toggleOpen  = tid => up(ts=>ts.map(t=>t.id===tid?{...t,open:!t.open}:t));
  const addTask     = (label,group) => { up(ts=>[...ts,mkT(label,group)]); setAddingTo(null); };
  const assignTask  = (tid,assignee) => up(ts=>ts.map(t=>t.id===tid?{...t,assignee}:t));
  const setDeadline = (tid,deadline) => up(ts=>ts.map(t=>t.id===tid?{...t,deadline}:t));
  const addSub      = (tid,l) => up(ts=>ts.map(t=>t.id===tid?{...t,open:true,subtasks:[...t.subtasks,{id:uid(),label:l,done:false}]}:t));
  const toggleSub   = (tid,sid) => up(ts=>ts.map(t=>t.id===tid?{...t,subtasks:t.subtasks.map(s=>s.id===sid?{...s,done:!s.done}:s)}:t));
  const deleteSub   = (tid,sid) => up(ts=>ts.map(t=>t.id===tid?{...t,subtasks:t.subtasks.filter(s=>s.id!==sid)}:t));
  const renameSub   = (tid,sid,l) => up(ts=>ts.map(t=>t.id===tid?{...t,subtasks:t.subtasks.map(s=>s.id===sid?{...s,label:l}:s)}:t));

  const startEditGroup = (grp) => {
    const cidx = getGroupColorIdx(grp, groupMeta);
    setGroupDraft({name: grp, colorIdx: cidx});
    setEditingGroup(grp);
  };
  const commitGroupEdit = () => {
    const oldName = editingGroup;
    const {name: newName, colorIdx} = groupDraft;
    if(!newName.trim()) return;
    // rename tasks
    if(newName !== oldName) up(ts=>ts.map(t=>t.group===oldName?{...t,group:newName}:t));
    // update groupMeta
    if(onUpdateGroupMeta) {
      const newMeta = {...groupMeta};
      newMeta[newName] = {colorIdx};
      if(newName !== oldName) delete newMeta[oldName];
      onUpdateGroupMeta(newMeta);
    }
    setEditingGroup(null);
  };

  const groups = [...new Set(tasks.map(t=>t.group))];
  const done = tasks.filter(t=>t.done).length;
  const pct  = tasks.length>0?Math.round((done/tasks.length)*100):0;
  const handleNewGroup = () => { if(newGroupName.trim()){ addTask("새 태스크",newGroupName.trim()); setNewGroup(false); setNewGroupName(""); }};

  return (
    <div className="space-y-4" onClick={e=>e.stopPropagation()}>
      <div className="flex items-center gap-3">
        <div className="flex-1"><MiniBar v={pct}/></div>
        <span className="text-xs text-gray-400 flex-shrink-0">{done}/{tasks.length} 완료</span>
      </div>
      {groups.map(grp=>{
        const grpTasks=tasks.filter(t=>t.group===grp), gDone=grpTasks.filter(t=>t.done).length;
        const col=getGroupCol(grp, groupMeta);
        const isAdding=addingTo===grp;
        const isEditing=editingGroup===grp;
        return (
          <div key={grp} className="bg-white rounded-lg border border-gray-100 p-3 space-y-2">
            <div className="flex items-center justify-between">
              {isEditing ? (
                <div className="flex items-center gap-2 flex-1" onClick={e=>e.stopPropagation()}>
                  {/* 색상 선택 */}
                  <div className="flex gap-1 flex-wrap">
                    {PAL.map((p,i)=>(
                      <button key={i} onClick={()=>setGroupDraft(d=>({...d,colorIdx:i}))}
                        className={`w-5 h-5 rounded-full ${p.dot} transition-all hover:scale-110 ${groupDraft.colorIdx===i?"ring-2 ring-offset-1 ring-gray-500 scale-110":""}`}/>
                    ))}
                  </div>
                  <input autoFocus value={groupDraft.name}
                    className="border border-blue-300 rounded-lg px-2 py-0.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-400 w-28"
                    onChange={e=>setGroupDraft(d=>({...d,name:e.target.value}))}
                    onKeyDown={e=>{if(e.key==="Enter")commitGroupEdit();if(e.key==="Escape")setEditingGroup(null);}}
                  />
                  <button onClick={commitGroupEdit} className="text-xs bg-blue-500 text-white px-2 py-0.5 rounded-lg hover:bg-blue-600">저장</button>
                  <button onClick={()=>setEditingGroup(null)} className="text-xs text-gray-400 px-1">✕</button>
                </div>
              ) : (
                <span className={`text-xs font-medium px-2 py-0.5 rounded-full border inline-flex items-center gap-1.5 ${col.bd}`}>
                  <span className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${col.dot}`}/>{grp}
                  <span className="text-gray-400 font-normal">{gDone}/{grpTasks.length}</span>
                  {canEdit&&<button onClick={e=>{e.stopPropagation();startEditGroup(grp);}}
                    className="opacity-60 hover:opacity-100 text-xs ml-0.5" title="그룹 편집">✏️</button>}
                </span>
              )}
              {canEdit&&!isEditing&&<button onClick={()=>setAddingTo(isAdding?null:grp)} className="text-xs text-blue-400 hover:text-blue-600 hover:bg-blue-50 px-1.5 py-0.5 rounded">+ 태스크</button>}
            </div>
            <div className="space-y-0.5 pl-0.5">
              {grpTasks.map(t=>(
                <TaskRow key={t.id} task={t}
                  onToggle={()=>toggleTask(t.id)} onDelete={()=>deleteTask(t.id)} onRename={l=>renameTask(t.id,l)}
                  onToggleOpen={()=>toggleOpen(t.id)} onAssign={a=>assignTask(t.id,a)}
                  onSetDeadline={d=>setDeadline(t.id,d)}
                  onAddSub={l=>addSub(t.id,l)} onToggleSub={sid=>toggleSub(t.id,sid)}
                  onDeleteSub={sid=>deleteSub(t.id,sid)} onRenameSub={(sid,l)=>renameSub(t.id,sid,l)}/>
              ))}
            </div>
            {canEdit&&isAdding&&<AddInput placeholder="새 태스크 이름..." onAdd={l=>addTask(l,grp)} onCancel={()=>setAddingTo(null)}/>}
          </div>
        );
      })}
      {canEdit&&(
        <div className="border-t border-dashed border-gray-200 pt-2">
          {newGroup
            ?<div className="flex items-center gap-1.5">
              <input autoFocus value={newGroupName} placeholder="새 그룹 이름..."
                className="flex-1 text-xs border border-blue-300 rounded-lg px-2 py-1.5 focus:outline-none"
                onChange={e=>setNewGroupName(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter")handleNewGroup();if(e.key==="Escape"){setNewGroup(false);setNewGroupName("");}}}
              />
              <button onClick={handleNewGroup} className="text-xs bg-blue-500 text-white px-2 py-1.5 rounded-lg hover:bg-blue-600">생성</button>
              <button onClick={()=>{setNewGroup(false);setNewGroupName("");}} className="text-xs text-gray-400 px-1">✕</button>
            </div>
            :<button onClick={()=>setNewGroup(true)} className="text-xs text-gray-400 hover:text-blue-500 flex items-center gap-1 py-1 hover:bg-blue-50 px-2 rounded-lg w-full"><span className="text-base leading-none">＋</span> 새 그룹 추가</button>
          }
        </div>
      )}
    </div>
  );
}

  const allTasks = useMemo(() => prods.flatMap(p=>[
    ...p.pt.map(t=>({...t, product:p.name, productId:p.id, typeLabel:"기획"})),
    ...p.ct.map(t=>({...t, product:p.name, productId:p.id, typeLabel:"콘텐츠"})),
    ...p.mt.map(t=>({...t, product:p.name, productId:p.id, typeLabel:"마케팅"})),
  ]),[prods]);

  const byMember = useMemo(()=> members.reduce((acc,m)=>{ acc[m]=allTasks.filter(t=>t.assignee===m); return acc; },{}), [allTasks,members]);
  const unassigned = useMemo(()=>allTasks.filter(t=>!t.assignee),[allTasks]);
  const display = selected==="전체" ? members : [selected];

  const handleAddMember = name => { const u=[...members,name]; setMembers(u); saveMembers(u); setAddingMember(false); };
  const handleDelMember = m => { if(window.confirm(`"${m}" 팀원을 삭제하시겠습니까?`)){ const u=members.filter(x=>x!==m); setMembers(u); saveMembers(u); }};
  const handleSaveMember = (oldName, newName, newColor) => { if(onEditMember) onEditMember(oldName,newName,newColor); if(selected===oldName) setSelected(newName); };

    <div className="space-y-5">

            return (
              <div key={m} className="flex items-center gap-0.5">

              </div>

                  <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">🔴 미완료</p>
                  {pending.map(t=>{
                    const today2=new Date(); today2.setHours(0,0,0,0);
                    const td=t.deadline?Math.round((new Date(t.deadline)-today2)/86400000):null;
                    const tdLabel=td===null?null:td<0?`D+${Math.abs(td)}`:`D-${td}`;
                    const tdColor=td===null?""
                      :td<0?"bg-red-100 text-red-500":td===0?"bg-red-50 text-red-500"
                      :td<=3?"bg-orange-100 text-orange-600":td<=7?"bg-amber-100 text-amber-600":"bg-gray-100 text-gray-500";

                          </div>

                          <div className="min-w-0">
                            <p className="text-xs text-gray-400 line-through leading-snug">{t.label}</p>
                            <p className="text-xs text-gray-300 truncate">{t.product}</p>
                          </div>
                        </div>
                      ))}

                  </details>

              )}
              {tasks.length===0&&<div className="px-4 py-6 text-center text-gray-400 text-xs">배정된 태스크가 없습니다</div>}

  );

/* ══ APP ══ */
function App() {
  const [prods, setProds] = useState(()=>{
    const saved = getData();
    const shared = getSharedData();
    const raw = saved || (shared?.prods) || INIT_RAW;
    return raw.map(migrate);
  });
  const [role,         setRole]          = useState("viewer");
  const [members,      setMembers]       = useState(()=>{ const shared=getSharedData(); return getMembers() || shared?.members || ["김민준","이서연","박지호"]; });
  const [memberColors, setMemberColors]  = useState(()=>{ const shared=getSharedData(); return getMemberColors() || shared?.memberColors || {}; });
  const [view,         setView]          = useState("products");
  const [filter,       setFilter]        = useState("전체");
  const [search,       setSearch]        = useState("");
  const [sort,         setSort]          = useState("default");
  const [openId,       setOpenId]        = useState(null);
  const [tabMap,       setTabMap]        = useState({});
  const [showUnlock,   setShowUnlock]    = useState(false);
  const [showChangePin,setShowChangePin] = useState(false);
  const [backupOpen,   setBackupOpen]   = useState(false);
  const [dirty,        setDirty]         = useState(false);
  const [saveFlash,    setSaveFlash]     = useState(false);
  const [syncStatus,   setSyncStatus]   = useState(window.FIREBASE_OK ? "연결 중" : "오프라인");
  const dirtyRef = useRef(false);
  useEffect(()=>{ dirtyRef.current = dirty; }, [dirty]);

  // 백업 드롭다운 외부 클릭 시 닫기
  useEffect(()=>{
    if(!backupOpen) return;
    const close = ()=>setBackupOpen(false);
    document.addEventListener("click", close);
    return ()=>document.removeEventListener("click", close);
  }, [backupOpen]);

  const upd     = (pid,fn) => { setProds(ps=>ps.map(p=>p.id===pid?fn(p):p)); setDirty(true); };
  const setF    = (pid,f,v) => upd(pid,p=>({...p,[f]:v}));
  const setRF   = (pid,f,v) => upd(pid,p=>({...p,reorder:p.reorder?{...p.reorder,[f]:v}:null}));
  const updTask = (pid,type,fn) => upd(pid,p=>({...p,[type]:fn(p[type])}));
  const updGroupMeta = (pid,type,meta) => upd(pid,p=>({...p,[`${type}GroupMeta`]:meta}));
  const getTab  = id => tabMap[id]||"planning";
  const setTab  = (id,t) => setTabMap(m=>({...m,[id]:t}));

  const moveProd = (idx, dir) => {
    setProds(ps => {
      const arr = [...ps];
      const newIdx = idx + dir;
      if(newIdx < 0 || newIdx >= arr.length) return ps;
      [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
      return arr;
    });
    setDirty(true);
  };

  const editMember = (oldName, newName, newColor) => {
    const updatedMembers = members.map(x => x===oldName ? newName : x);
    setMembers(updatedMembers); saveMembers(updatedMembers);
    const updatedColors = {...memberColors, [newName]: newColor};
    if(newName !== oldName) delete updatedColors[oldName];
    setMemberColors(updatedColors); saveMemberColors(updatedColors);
    if(newName !== oldName) {
      setProds(ps => ps.map(p => ({
        ...p,
        pt: p.pt.map(t => t.assignee===oldName ? {...t, assignee:newName} : t),
        ct: p.ct.map(t => t.assignee===oldName ? {...t, assignee:newName} : t),
        mt: p.mt.map(t => t.assignee===oldName ? {...t, assignee:newName} : t),
      })));
    }
  };

  const addProd = () => {
    const np = {
      id:Date.now(), name:"새 제품", url:"", category:"미분류", status:"기획",
      ordered:false, qty:0, stock:0, deadline:"", memo:"", reorder:null,
      image:null, price:0, cost:0, sku:"", description:"",
      pt: mkDefaultPT("기획"),
      ct:[mkT('기획서 작성','상세페이지'),mkT('촬영','상세페이지'),mkT('편집','상세페이지'),mkT('등록 완료','상세페이지'),mkT('썸네일 촬영','썸네일'),mkT('썸네일 편집','썸네일'),mkT('패키지 디자인','패키지'),mkT('상품 설명 검수','검수')],
      mt:[mkT('광고 이미지 제작','광고 소재'),mkT('광고 영상 제작','광고 소재'),mkT('SNS 포스팅 초안','SNS'),mkT('릴스/쇼츠 제작','SNS'),mkT('인플루언서 섭외','바이럴'),mkT('리뷰 의뢰','바이럴'),mkT('키워드 광고 등록','광고 집행'),mkT('스마트스토어 최적화','광고 집행')],
      groupMeta:{}, ptGroupMeta:{}, ctGroupMeta:{}, mtGroupMeta:{},
    };
    setProds(ps=>[...ps,np]); setDirty(true); setOpenId(np.id); setTab(np.id,"planning");
  };
  const delProd = pid => {
    if(window.confirm("이 제품을 삭제하시겠습니까?")) {
      setProds(ps=>ps.filter(p=>p.id!==pid)); setDirty(true);
      if(openId===pid) setOpenId(null);
    }
  };

  const handleSave = useCallback(async () => {
    saveData(prods); setDirty(false); setSaveFlash(true);
    setTimeout(()=>setSaveFlash(false), 2000);
    if(window.FIREBASE_OK && window.CLOUD_REF){
      setSyncStatus("저장 중...");
      try {
        await window.CLOUD_REF.set({
          prods, members, memberColors,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        setSyncStatus("동기화됨");
      } catch(err) {
        setSyncStatus("저장 오류");
        console.error("Firestore save error:", err);
        alert("클라우드 저장 실패: " + err.message);
      }
    }
  }, [prods, members, memberColors]);

  // 공유용 파일 저장 - 현재 데이터를 HTML에 포함해서 다운로드
  const handleSharedSave = () => {
    const html = document.documentElement.outerHTML;
    const dataStr = JSON.stringify({prods, members, memberColors});
    const updated = html.replace(
      /<script id="shared-data" type="application\/json">[\s\S]*?<\/script>/,
      `<script id="shared-data" type="application/json">${dataStr}<\/script>`
    );
    const blob = new Blob([updated], {type:"text/html;charset=utf-8"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href=url; a.download=`peston-shared-${new Date().toISOString().slice(0,10)}.html`;
    a.click(); URL.revokeObjectURL(url);
  };

  const handleExport = () => {
    const data = { prods, members, memberColors, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href=url; a.download=`peston-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(url);
  };

  const handleImport = e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if(!data.prods){ alert("올바른 백업 파일이 아닙니다."); return; }
        if(!window.confirm("현재 데이터를 백업 파일로 덮어쓰시겠습니까?")) return;
        setProds(data.prods.map(migrate)); saveData(data.prods);
        if(data.members){ setMembers(data.members); saveMembers(data.members); }
        if(data.memberColors){ setMemberColors(data.memberColors); saveMemberColors(data.memberColors); }
        setDirty(false); setSaveFlash(true); setTimeout(()=>setSaveFlash(false), 2000);
      } catch { alert("파일을 읽을 수 없습니다."); }
    };
    reader.readAsText(file); e.target.value="";
  };

  useEffect(()=>{
    const handler = e => { if((e.ctrlKey||e.metaKey)&&e.key==="s"){ e.preventDefault(); handleSave(); }};
    window.addEventListener("keydown",handler);
    return ()=>window.removeEventListener("keydown",handler);
  }, [handleSave]);

  // Firestore 실시간 동기화
  useEffect(()=>{
    if(!window.FIREBASE_OK || !window.CLOUD_REF){ setSyncStatus("오프라인"); return; }
    const unsub = window.CLOUD_REF.onSnapshot(
      doc => {
        if(doc.exists){
          const data = doc.data();
          if(!dirtyRef.current){
            if(data.prods)        setProds(data.prods.map(migrate));
            if(data.members)      { setMembers(data.members); saveMembers(data.members); }
            if(data.memberColors) { setMemberColors(data.memberColors); saveMemberColors(data.memberColors); }
          }
          setSyncStatus("동기화됨");
        } else {
          // 문서 없음 - 첫 사용
          setSyncStatus("동기화됨");
        }
      },
      err => { console.error("Firestore error:", err); setSyncStatus("오류"); }
    );
    return () => unsub();
  }, []);

  const kpi = useMemo(()=>({
    total:      prods.length,
    selling:    prods.filter(p=>p.status==="판매중").length,
    producing:  prods.filter(p=>p.status==="생산중").length,
    waiting:    prods.filter(p=>p.status==="입고대기").length,
    reordering: prods.filter(p=>p.reorder).length,
    stock:      prods.reduce((s,p)=>s+p.stock,0),
    urgent:     prods.filter(p=>{ const d=dl(p.deadline); return d!==null&&d>=0&&d<=7; }).length,
  }),[prods]);

  const rows = useMemo(()=>{
    let list=[...prods];
    if(filter==="재발주중") list=list.filter(p=>p.reorder);
    else if(filter==="urgent") list=list.filter(p=>{ const d=dl(p.deadline); return d!==null&&d>=0&&d<=7; });
    else if(filter!=="전체") list=list.filter(p=>p.status===filter);
    if(search.trim()) list=list.filter(p=>p.name.includes(search.trim()));
    if(sort==="stock")    list.sort((a,b)=>b.stock-a.stock);
    if(sort==="deadline") list.sort((a,b)=>(a.deadline||"9999").localeCompare(b.deadline||"9999"));
    if(sort==="pipeline") list.sort((a,b)=>si(b.status)-si(a.status));
    if(sort==="pt")       list.sort((a,b)=>b.pt.filter(t=>t.done).length-a.pt.filter(t=>t.done).length);
    if(sort==="ct")       list.sort((a,b)=>b.ct.filter(t=>t.done).length-a.ct.filter(t=>t.done).length);
    if(sort==="mt")       list.sort((a,b)=>b.mt.filter(t=>t.done).length-a.mt.filter(t=>t.done).length);
    return list;
  },[prods,filter,search,sort]);

  const TODAY = new Date().toISOString().split("T")[0];

  return (
    <RoleCtx.Provider value={role}>
    <MembersCtx.Provider value={{ members, setMembers, memberColors, setMemberColors }}>
    <div className="min-h-screen bg-slate-50 font-sans">

      {showUnlock    && <UnlockModal onUnlock={()=>setRole("editor")} onClose={()=>setShowUnlock(false)}/>}
      {showChangePin && <ChangePinModal onClose={()=>setShowChangePin(false)}/>}

      {/* ── HEADER ── */}
      <header className="bg-white border-b border-gray-200 sticky top-0 z-20 shadow-sm">
        <div className="max-w-screen-2xl mx-auto px-6 py-3 flex items-center justify-between gap-3">
          <div className="flex items-center gap-3 flex-shrink-0">
            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
              <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
              </svg>
            </div>
            <span className="font-bold text-gray-900 tracking-tight">PESTON</span>
            <span className="text-sm text-gray-400 hidden md:inline">제품 런칭 대시보드</span>
          </div>

          <div className="flex items-center gap-1 bg-gray-100 rounded-lg p-1">
            <button onClick={()=>setView("products")}
              className={`px-3 py-1.5 rounded-md text-xs font-medium transition-all ${view==="products"?"bg-white text-gray-800 shadow-sm":"text-gray-500 hover:text-gray-700"}`}>
              📦 제품 현황
            </button>
            <button onClick={()=>setView("team")}
              className={`px-3 py-1.5 rounded-md text-xs font-medium transition-all ${view==="team"?"bg-white text-gray-800 shadow-sm":"text-gray-500 hover:text-gray-700"}`}>
              👥 팀 현황
            </button>
          </div>

          <div className="flex items-center gap-2">
            {/* 백업 드롭다운 (클릭 토글) */}
            <div className="relative" onClick={e=>e.stopPropagation()}>
              <button
                onClick={()=>setBackupOpen(b=>!b)}
                className="text-sm px-2.5 py-1.5 rounded-lg flex items-center gap-1 border bg-gray-50 text-gray-500 border-gray-200 hover:bg-gray-100 hover:text-gray-700 transition-all" title="백업 / 복원">
                🗂️ <span className="hidden sm:inline text-xs">백업</span>
                <span className="text-gray-400 text-xs">{backupOpen?"▴":"▾"}</span>
              </button>
              {backupOpen&&(
                <div className="absolute right-0 top-full mt-1 z-30 bg-white border border-gray-200 rounded-xl shadow-lg py-1.5 w-52">
                  <button onClick={()=>{handleExport();setBackupOpen(false);}}
                    className="w-full text-left text-xs px-3.5 py-2 hover:bg-blue-50 flex items-center gap-2 text-gray-700 hover:text-blue-600">
                    <span>📥</span>
                    <div><p className="font-medium">백업 다운로드</p><p className="text-gray-400 text-xs">JSON 파일로 저장</p></div>
                  </button>
                  <label className="w-full text-left text-xs px-3.5 py-2 hover:bg-amber-50 flex items-center gap-2 text-gray-700 hover:text-amber-600 cursor-pointer"
                    onClick={()=>setBackupOpen(false)}>
                    <span>📤</span>
                    <div><p className="font-medium">백업에서 복원</p><p className="text-gray-400 text-xs">JSON 파일 불러오기</p></div>
                    <input type="file" accept=".json" className="hidden" onChange={handleImport}/>
                  </label>
                  <div className="border-t border-gray-100 my-1"/>
                  <button onClick={()=>{handleSharedSave();setBackupOpen(false);}}
                    className="w-full text-left text-xs px-3.5 py-2 hover:bg-emerald-50 flex items-center gap-2 text-gray-700 hover:text-emerald-600">
                    <span>🔗</span>
                    <div><p className="font-medium">공유용 파일 저장</p><p className="text-gray-400 text-xs">다른 사람도 볼 수 있는 HTML</p></div>
                  </button>
                </div>
              )}
            </div>

            {/* 저장 */}
            <button onClick={handleSave} title="저장 (Ctrl+S)"
              className={`text-sm px-3 py-1.5 rounded-lg flex items-center gap-1.5 font-medium transition-all border
                ${saveFlash
                  ? "bg-emerald-500 text-white border-emerald-500 scale-95"
                  : dirty
                    ? "bg-blue-600 text-white border-blue-600 hover:bg-blue-700 shadow-sm animate-pulse"
                    : "bg-gray-50 text-gray-400 border-gray-200 hover:bg-gray-100 hover:text-gray-600"}`}>
              {saveFlash ? "✓ 저장됨" : "💾 저장"}
              {dirty&&!saveFlash&&<span className="w-1.5 h-1.5 rounded-full bg-white/80 inline-block ml-0.5"/>}
            </button>

            {/* 권한 */}
            {role==="editor"
              ?<div className="flex items-center gap-1.5">
                  <span className="text-xs bg-emerald-50 text-emerald-700 border border-emerald-200 px-2 py-1 rounded-lg font-medium flex items-center gap-1">
                    <span>🔓</span> 편집자
                  </span>
                  <button onClick={()=>setShowChangePin(true)} className="text-xs text-gray-400 hover:text-gray-600 px-1.5 py-1 rounded hover:bg-gray-100" title="PIN 변경">🔑</button>
                  <button onClick={()=>setRole("viewer")} className="text-xs text-gray-500 border border-gray-200 px-2 py-1 rounded-lg hover:bg-gray-50">잠금</button>
                </div>
              :<button onClick={()=>setShowUnlock(true)}
                  className="text-xs bg-gray-100 text-gray-600 hover:bg-blue-50 hover:text-blue-600 px-3 py-1.5 rounded-lg border border-gray-200 flex items-center gap-1.5 transition-colors">
                  <span>🔐</span> 편집 모드
                </button>

            {role==="editor"&&(
              <button onClick={addProd}
                className="text-sm bg-blue-600 text-white px-3 py-1.5 rounded-lg hover:bg-blue-700 flex items-center gap-1.5 shadow-sm transition-colors flex-shrink-0">
                ＋ 제품 추가
              </button>
            )}
            <span className="text-xs text-gray-400 hidden sm:flex items-center gap-1.5">
              <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 inline-block"/>{TODAY}
            </span>
            {/* 동기화 상태 */}
            {(()=>{
              const dot=syncStatus==="동기화됨"?"bg-emerald-400"
                :syncStatus==="저장 중..."?"bg-blue-400 animate-pulse"
                :syncStatus==="오류"||syncStatus==="저장 오류"?"bg-red-400"
                :syncStatus==="연결 중"?"bg-amber-400 animate-pulse"

              return (
                <span className="hidden sm:flex items-center gap-1 text-xs text-gray-400" title={syncStatus}>
                  <span className={`w-1.5 h-1.5 rounded-full inline-block ${dot}`}/>
                  {syncStatus}
                </span>
              );
            })()}
          </div>
        </div>
      </header>

      <div className="max-w-screen-2xl mx-auto px-6 py-6 space-y-5">
        {/* KPI */}
        <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-7 gap-3">
          <KPI icon="📦" label="전체 제품"  value={kpi.total}                         color="gray"    active={filter==="전체"&&view==="products"}    onClick={()=>{setFilter("전체");setView("products");}} />
          <KPI icon="🛒" label="판매 중"    value={kpi.selling}                       color="emerald" active={filter==="판매중"&&view==="products"}   onClick={()=>{setFilter("판매중");setView("products");}} />
          <KPI icon="🏭" label="생산 중"    value={kpi.producing}                     color="blue"    active={filter==="생산중"&&view==="products"}   onClick={()=>{setFilter("생산중");setView("products");}} />
          <KPI icon="📬" label="입고 대기"  value={kpi.waiting}                       color="amber"   active={filter==="입고대기"&&view==="products"} onClick={()=>{setFilter("입고대기");setView("products");}} />
          <KPI icon="🔄" label="재발주 중"  value={kpi.reordering}                    color="indigo"  active={filter==="재발주중"&&view==="products"} onClick={()=>{setFilter("재발주중");setView("products");}} />
          <KPI icon="🗃️" label="총 재고"    value={`${kpi.stock.toLocaleString()}개`} color="purple"  />
          <KPI icon="⚡" label="D-7 임박"   value={kpi.urgent}                        color="red"     active={filter==="urgent"&&view==="products"}   onClick={()=>{setFilter("urgent");setView("products");}} />
        </div>

        {view==="products"&&(
          <>
          {/* 필터 바 */}
          <div className="bg-white rounded-xl border border-gray-200 shadow-sm px-4 py-3 flex flex-wrap items-center gap-3">
            <div className="relative min-w-44 flex-1 max-w-60">
              <svg className="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
              <input type="text" placeholder="제품 검색..."
                className="w-full pl-8 pr-3 py-1.5 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                value={search} onChange={e=>setSearch(e.target.value)}/>
            </div>
            <div className="flex flex-wrap gap-1.5">
              {["전체",...STAGES,"재발주중"].map(s=>{
                const active=filter===s, cfg=SCFG[s];
                const count=s==="전체"?prods.length:s==="재발주중"?prods.filter(p=>p.reorder).length:prods.filter(p=>p.status===s).length;
                return (
                  <button key={s} onClick={()=>setFilter(s)}
                    className={`px-2.5 py-1 rounded-lg text-xs font-medium border transition-all
                      ${active?s==="전체"?"bg-blue-600 text-white border-blue-600":s==="재발주중"?"bg-indigo-600 text-white border-indigo-600":`${cfg?.bg||"bg-gray-500"} text-white border-transparent`:"bg-gray-50 text-gray-500 border-gray-200 hover:bg-gray-100"}`}>
                    {s==="재발주중"&&"🔄 "}{s} <span className="opacity-75">{count}</span>
                  </button>
                );
              })}
            </div>
            <select className="ml-auto text-xs border border-gray-200 rounded-lg px-2.5 py-1.5 bg-white text-gray-600 focus:outline-none"
              value={sort} onChange={e=>setSort(e.target.value)}>
              <option value="default">기본순</option><option value="pipeline">단계순</option>
              <option value="stock">재고 많은순</option><option value="deadline">마감일 빠른순</option>
              <option value="pt">기획 진행순</option>
              <option value="ct">콘텐츠 진행순</option><option value="mt">마케팅 진행순</option>
            </select>
          </div>

          {/* 제품 테이블 */}
          <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
            {/* 헤더 */}
            <div className="grid items-center bg-gray-50 border-b border-gray-200 px-5 py-2.5 text-xs font-semibold text-gray-500 uppercase tracking-wide"
              style={{gridTemplateColumns:"52px 2.6fr 2fr 120px 1.3fr 1.3fr 1.3fr 80px 72px"}}>
              <span></span>
              <span>제품</span><span>파이프라인</span><span>재고 현황</span>
              <span>기획단계</span><span>콘텐츠 제작</span><span>마케팅 준비</span>
              <span>완료 예정</span><span></span>
            </div>

            {rows.length===0&&<div className="py-16 text-center text-gray-400 text-sm"><p className="text-3xl mb-2">🔍</p>조건에 맞는 제품이 없습니다.</div>}

            {rows.map((p,idx)=>{
              // find index in prods array (not filtered rows) for reorder
              const prodIdx = prods.findIndex(x=>x.id===p.id);
              const d=dl(p.deadline);
              const isOver=d!==null&&d<0&&p.status!=="판매중";
              const isUrg=d!==null&&d>=0&&d<=7;
              const exp=openId===p.id, tab=getTab(p.id);
              const pDone=p.pt.filter(t=>t.done).length, pPct=p.pt.length>0?Math.round((pDone/p.pt.length)*100):0;
              const cDone=p.ct.filter(t=>t.done).length, cPct=p.ct.length>0?Math.round((cDone/p.ct.length)*100):0;
              const mDone=p.mt.filter(t=>t.done).length, mPct=p.mt.length>0?Math.round((mDone/p.mt.length)*100):0;
              return (
                <div key={p.id} className={`border-b border-gray-100 last:border-0 ${isOver?"bg-red-50/60":isUrg?"bg-amber-50/40":idx%2===1?"bg-gray-50/40":"bg-white"}`}>
                  {/* 메인 행 */}
                  <div className="grid items-center px-5 py-3 cursor-pointer hover:bg-blue-50/20 transition-colors"
                    style={{gridTemplateColumns:"52px 2.6fr 2fr 120px 1.3fr 1.3fr 1.3fr 80px 72px"}}
                    onClick={()=>setOpenId(exp?null:p.id)}>

                    {/* 제품 이미지 */}
                    <div onClick={e=>e.stopPropagation()}>
                      <ProductImage image={p.image} name={p.name} size="sm"
                        onChange={v=>setF(p.id,"image",v)}/>
                    </div>

                    {/* 제품명 */}
                    <div className="px-2 min-w-0">
                      <div className="flex items-center gap-1.5 min-w-0">
                        <Editable value={p.name} onChange={v=>setF(p.id,"name",v)} className="font-semibold text-gray-800 text-sm leading-snug" placeholder="제품명"/>
                        {p.url&&<a href={p.url} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} className="text-blue-400 hover:text-blue-600 flex-shrink-0" title="제품 링크">
                          <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                        </a>}
                      </div>
                      <div className="flex items-center gap-1.5 mt-0.5 flex-wrap">
                        <span className={`text-xs px-1.5 py-0.5 rounded ${SCFG[p.status]?.lt||"bg-gray-100"} ${SCFG[p.status]?.tx||"text-gray-600"}`}>{p.category}</span>
                        {p.reorder&&<span className="text-xs bg-indigo-50 text-indigo-600 px-1.5 py-0.5 rounded font-medium">🔄 재발주</span>}
                      </div>
                    </div>

                    {/* 파이프라인 */}
                    <div className="pr-2"><PipelineBar status={p.status}/></div>

                    {/* 재고 */}
                    <div>
                      <div className="flex items-baseline gap-1">
                        <span className={`text-xl font-bold tabular-nums leading-none ${p.stock===0?"text-gray-400":p.stock<100?"text-amber-600":"text-emerald-600"}`}>
                          <EditNum value={p.stock} min={0} max={99999} onChange={v=>setF(p.id,"stock",v)}/>
                        </span>
                        <span className="text-xs text-gray-400">개</span>
                      </div>
                      <ReorderBadge reorder={p.reorder}/>
                    </div>

                    {/* 기획단계 */}
                    <div className="pr-2 space-y-1.5">
                      <TaskDots tasks={p.pt} groupMeta={p.ptGroupMeta||{}}/>
                      <MiniBar v={pPct}/>
                    </div>

                    {/* 콘텐츠 제작 */}
                    <div className="pr-2 space-y-1.5">
                      <TaskDots tasks={p.ct} groupMeta={p.ctGroupMeta||{}}/>
                      <MiniBar v={cPct}/>
                    </div>

                    {/* 마케팅 준비 */}
                    <div className="pr-2 space-y-1.5">
                      <TaskDots tasks={p.mt} groupMeta={p.mtGroupMeta||{}}/>
                      <MiniBar v={mPct}/>
                    </div>

                    {/* 완료 예정일 */}
                    <div className="text-xs text-right pr-1">
                      {p.deadline
                        ?<><p className={`font-medium ${isOver?"text-red-500":isUrg?"text-amber-600":"text-gray-600"}`}>{p.deadline}</p>
                          {d!==null&&<p className={`mt-0.5 ${isOver?"text-red-400":isUrg?"text-amber-500":"text-gray-400"}`}>{isOver?`${Math.abs(d)}일 초과`:`D-${d}`}</p>}</>
                        :<span className="text-gray-400">미정</span>}
                    </div>

                    {/* 컨트롤 */}
                    <div className="flex items-center justify-end gap-0.5" onClick={e=>e.stopPropagation()}>
                      {role==="editor"&&(
                        <div className="flex flex-col gap-0.5 mr-0.5">
                          <button onClick={()=>moveProd(prodIdx,-1)} disabled={prodIdx===0}
                            className={`text-gray-300 hover:text-blue-400 p-0.5 rounded text-xs leading-none ${prodIdx===0?"opacity-30 cursor-not-allowed":""}`} title="위로">▲</button>
                          <button onClick={()=>moveProd(prodIdx,1)} disabled={prodIdx===prods.length-1}
                            className={`text-gray-300 hover:text-blue-400 p-0.5 rounded text-xs leading-none ${prodIdx===prods.length-1?"opacity-30 cursor-not-allowed":""}`} title="아래로">▼</button>
                        </div>
                      )}
                      {role==="editor"&&<button onClick={e=>{e.stopPropagation();delProd(p.id);}} className="p-1 text-gray-300 hover:text-red-400 transition-colors rounded" title="제품 삭제">

                      </button>}
                      <svg className={`w-4 h-4 text-gray-400 transition-transform ${exp?"rotate-180":""}`} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7"/>

                          {key:"planning",  label:"📋 기획단계",   badge:`${pDone}/${p.pt.length}`},
                          {key:"content",   label:"🎨 콘텐츠 제작", badge:`${cDone}/${p.ct.length}`},

                          {key:"reorder",   label:"🔄 재발주",      badge:p.reorder?p.reorder.status:"없음"},

                          <button key={tb.key} onClick={()=>setTab(p.id,tb.key)}

                        ))}
                      </div>

                      {tab==="planning"&&<TaskPanel tasks={p.pt} groupMeta={p.ptGroupMeta||{}} onUpdate={fn=>updTask(p.id,"pt",fn)} onUpdateGroupMeta={m=>updGroupMeta(p.id,"pt",m)}/>}
                      {tab==="content"&&<TaskPanel tasks={p.ct} groupMeta={p.ctGroupMeta||{}} onUpdate={fn=>updTask(p.id,"ct",fn)} onUpdateGroupMeta={m=>updGroupMeta(p.id,"ct",m)}/>}
                      {tab==="marketing"&&<TaskPanel tasks={p.mt} groupMeta={p.mtGroupMeta||{}} onUpdate={fn=>updTask(p.id,"mt",fn)} onUpdateGroupMeta={m=>updGroupMeta(p.id,"mt",m)}/>}

                      {tab==="reorder"&&(
                        <div>
                          {p.reorder
                            ?<div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                <div className="bg-white rounded-lg border border-gray-200 p-4">
                                  <p className="text-xs text-gray-500 mb-1">재발주 수량</p>
                                  <p className="text-2xl font-bold text-indigo-600"><EditNum value={p.reorder.qty} min={0} max={99999} suffix="개" onChange={v=>setRF(p.id,"qty",v)}/></p>
                                </div>
                                <div className="bg-white rounded-lg border border-gray-200 p-4">
                                  <p className="text-xs text-gray-500 mb-2">현재 단계</p>
                                  <select className="text-sm border border-gray-200 rounded-lg px-2 py-1.5 w-full focus:outline-none" disabled={role!=="editor"}
                                    value={p.reorder.status} onChange={e=>setRF(p.id,"status",e.target.value)}>
                                    {["발주완료","생산중","입고대기"].map(s=><option key={s}>{s}</option>)}
                                  </select>
                                </div>
                                <div className="bg-white rounded-lg border border-gray-200 p-4">
                                  <p className="text-xs text-gray-500 mb-1">입고 예정일</p>
                                  <input type="date" className="text-sm border border-gray-200 rounded-lg px-2 py-1.5 w-full focus:outline-none" disabled={role!=="editor"}
                                    value={p.reorder.deadline} onChange={e=>setRF(p.id,"deadline",e.target.value)}/>
                                  {p.reorder.deadline&&<p className="text-xs text-indigo-500 mt-1">D-{dl(p.reorder.deadline)}</p>}
                                </div>
                                {role==="editor"&&<div className="sm:col-span-3 flex justify-end">
                                  <button onClick={()=>setF(p.id,"reorder",null)} className="text-xs text-red-400 hover:text-red-600 px-3 py-1.5 border border-red-200 rounded-lg hover:bg-red-50">재발주 취소</button>
                                </div>}
                              </div>
                            :<div className="text-center py-8 space-y-3">
                                <p className="text-gray-400 text-sm">재발주 정보가 없습니다.</p>
                                {role==="editor"&&<button onClick={()=>{setF(p.id,"reorder",{qty:0,deadline:"",status:"발주완료"});setTab(p.id,"reorder");}}
                                  className="px-4 py-2 bg-indigo-600 text-white text-sm rounded-lg hover:bg-indigo-700 shadow-sm">🔄 재발주 등록하기</button>}
                              </div>
                          }
                        </div>
                      )}

                      {tab==="info"&&(
                        <div className="space-y-5">
                          {/* 제품 이미지 섹션 */}
                          <div className="bg-white rounded-xl border border-gray-100 p-4">
                            <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">제품 사진</p>
                            <div className="flex items-start gap-4">
                              <ProductImage image={p.image} name={p.name} size="lg"
                                onChange={v=>setF(p.id,"image",v)}/>
                              <div className="flex-1 text-xs text-gray-400 space-y-1 pt-1">
                                <p>권장 이미지: 정방형 (1:1)</p>
                                <p>클릭하여 사진을 추가하거나 변경하세요</p>
                                {role!=="editor"&&<p className="text-amber-500">편집 모드에서만 사진을 변경할 수 있습니다</p>}
                              </div>
                            </div>
                          </div>

                          {/* 기본 정보 */}
                          <div className="bg-white rounded-xl border border-gray-100 p-4">
                            <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">기본 정보</p>
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-5">
                              <div><p className="text-xs text-gray-500 mb-1">제품명</p><Editable value={p.name} onChange={v=>setF(p.id,"name",v)} className="text-sm font-semibold text-gray-800" placeholder="제품명"/></div>
                              <div><p className="text-xs text-gray-500 mb-1">카테고리</p><Editable value={p.category} onChange={v=>setF(p.id,"category",v)} className="text-sm text-gray-700" placeholder="카테고리"/></div>
                              <div>
                                <p className="text-xs text-gray-500 mb-2">진행 상태</p>
                                <select className="text-sm border border-gray-200 rounded-lg px-2 py-1 w-full focus:outline-none" disabled={role!=="editor"}
                                  value={p.status} onChange={e=>setF(p.id,"status",e.target.value)}>
                                  {STAGES.map(s=><option key={s}>{s}</option>)}
                                </select>
                              </div>
                              <div><p className="text-xs text-gray-500 mb-1">SKU / 모델번호</p><Editable value={p.sku||""} onChange={v=>setF(p.id,"sku",v)} className="text-sm text-gray-700 font-mono" placeholder="SKU-001"/></div>
                              <div className="sm:col-span-2">
                                <p className="text-xs text-gray-500 mb-1">제품 링크 URL</p>
                                <Editable value={p.url||""} onChange={v=>setF(p.id,"url",v)} className="text-sm text-blue-600 break-all" placeholder="https://..."/>
                                {p.url&&<a href={p.url} target="_blank" rel="noopener noreferrer" className="text-xs text-blue-400 hover:underline mt-0.5 inline-flex items-center gap-0.5">링크 열기 ↗</a>}
                              </div>
                            </div>
                          </div>

                          {/* 상품 설명 */}
                          <div className="bg-white rounded-xl border border-gray-100 p-4">
                            <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">상품 설명</p>
                            <Editable value={p.description||""} onChange={v=>setF(p.id,"description",v)} className="text-sm text-gray-600 leading-relaxed w-full block" placeholder="상품 설명을 입력하세요... (주요 특징, 사용법 등)"/>
                          </div>

                          {/* 가격 & 재고 */}
                          <div className="bg-white rounded-xl border border-gray-100 p-4">
                            <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">가격 & 재고</p>
                            <div className="grid grid-cols-2 sm:grid-cols-4 gap-5">
                              <div>
                                <p className="text-xs text-gray-500 mb-1">판매가</p>
                                <p className="text-sm font-bold text-blue-600"><EditNum value={p.price||0} min={0} max={9999999} suffix="원" onChange={v=>setF(p.id,"price",v)}/></p>
                              </div>
                              <div>
                                <p className="text-xs text-gray-500 mb-1">원가</p>
                                <p className="text-sm font-bold text-gray-700"><EditNum value={p.cost||0} min={0} max={9999999} suffix="원" onChange={v=>setF(p.id,"cost",v)}/></p>
                              </div>
                              <div>
                                <p className="text-xs text-gray-500 mb-1">발주 수량</p>
                                <p className="text-sm font-medium text-gray-700"><EditNum value={p.qty} min={0} max={99999} suffix="개" onChange={v=>setF(p.id,"qty",v)}/></p>
                              </div>
                              <div>
                                <p className="text-xs text-gray-500 mb-1">현재 재고</p>
                                <p className="text-sm font-bold text-gray-700"><EditNum value={p.stock} min={0} max={99999} suffix="개" onChange={v=>setF(p.id,"stock",v)}/></p>
                              </div>
                            </div>
                            {(p.price>0&&p.cost>0)&&(
                              <div className="mt-3 pt-3 border-t border-gray-100 flex gap-6 text-xs">
                                <span className="text-gray-500">마진: <span className="font-semibold text-emerald-600">{(p.price-p.cost).toLocaleString()}원</span></span>
                                <span className="text-gray-500">마진율: <span className="font-semibold text-emerald-600">{Math.round(((p.price-p.cost)/p.price)*100)}%</span></span>
                              </div>
                            )}
                          </div>

                          {/* 일정 & 메모 */}
                          <div className="bg-white rounded-xl border border-gray-100 p-4">
                            <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">일정 & 메모</p>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                              <div>
                                <p className="text-xs text-gray-500 mb-1">완료 예정일</p>
                                <input type="date" className="text-sm border border-gray-200 rounded-lg px-2 py-1.5 w-full focus:outline-none" disabled={role!=="editor"}
                                  value={p.deadline} onChange={e=>setF(p.id,"deadline",e.target.value)}/>
                              </div>
                              <div>
                                <p className="text-xs text-gray-500 mb-1">메모</p>
                                <Editable value={p.memo||""} onChange={v=>setF(p.id,"memo",v)} className="text-sm text-gray-600 leading-relaxed" placeholder="메모를 입력하세요..."/>
                              </div>
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          </>
        )}

        {view==="team"&&<TeamView prods={prods} onEditMember={editMember}/>}

        {/* 하단 도움말 */}
        <div className="bg-white rounded-xl border border-gray-200 shadow-sm px-5 py-3">
          <div className="grid grid-cols-2 md:grid-cols-4 gap-2 text-xs text-gray-400">
            <div>💾 <span className="text-gray-600 font-medium">저장</span> → Ctrl+S 또는 저장 버튼</div>
            <div>🔗 <span className="text-gray-600 font-medium">공유</span> → 백업 → 공유용 파일 저장</div>
            <div>↑↓ <span className="text-gray-600 font-medium">제품 순서</span> → 편집모드에서 ▲▼ 버튼</div>
            <div>✏️ <span className="text-gray-600 font-medium">그룹 편집</span> → 태스크 그룹 배지의 ✏️ 클릭</div>
          </div>
        </div>
      </div>
    </div>
    </MembersCtx.Provider>
    </RoleCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
